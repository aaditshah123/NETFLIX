
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>NETFLIX ❤️</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#141414;
color:white;
}

.navbar{
padding:20px 50px;
background:black;
}

.logo{
color:#E50914;
font-size:40px;
font-weight:bold;
}

.hero{
height:90vh;
background:url('https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=1600') center/cover;
display:flex;
align-items:center;
padding-left:80px;
}

.content{
max-width:600px;
background:rgba(0,0,0,0.5);
padding:30px;
border-radius:10px;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:5px;
cursor:pointer;
margin-right:10px;
}

.play{
background:white;
}

.info{
background:gray;
color:white;
}

.row{
padding:30px 50px;
}

.cards{
display:flex;
gap:15px;
overflow-x:auto;
}

.card{
min-width:250px;
height:150px;
background:#333;
border-radius:10px;
transition:.3s;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
}

.card:hover{
transform:scale(1.08);
}

</style>
</head>

<body>

<div class="navbar">
<div class="logo">HERFLIX ❤️</div>
</div>

<div class="hero">
<div class="content">
<h1>Our Story</h1>

<p>
A collection of our memories,
videos, photos and adventures.
</p>

<button class="play">▶ Play</button>
<button class="info">More Info</button>

</div>
</div>

<div class="row">

<h2>❤️ Favourite Memories</h2>

<div class="cards">

<div class="card">First Date</div>
<div class="card">Goa Trip</div>
<div class="card">Birthday</div>
<div class="card">Ireland Soon 🇮🇪</div>

</div>

</div>

</body>
</html>
